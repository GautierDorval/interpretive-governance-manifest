- '@type': DefinedTerm
  '@id': https://gautierdorval.com/definitions/gouvernance-interpretative/#definedterm
  name: Gouvernance interprétative
  description: Architecture environnementale visant à borner l’espace d’interprétation machine afin de réduire les inférences
    plausibles mais erronées. Elle agit par surfaces, hiérarchies de sources, relations canoniques et négations explicites,
    sans présumer d’obéissance interne du modèle.
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/interpretive-governance
  url: https://gautierdorval.com/definitions/gouvernance-interpretative/
  creator:
    '@id': https://gautierdorval.com/entite/#person
- '@type': DefinedTerm
  '@id': https://gautierdorval.com/defined-terms/interpretive-governance/exposure-regimes
  name: Régimes d’effet (exposition)
  description: Cartographie des voies de propagation de la gouvernance interprétative selon le régime d’accès à l’environnement
    gouverné (direct, indirect, contextuel, différé).
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/interpretive-governance
  creator:
    '@id': https://gautierdorval.com/entite/#person
- '@type': DefinedTerm
  '@id': https://gautierdorval.com/defined-terms/interpretive-governance/effect-direct
  name: Effet direct
  description: Régime d’effet où le système observe activement l’environnement (crawl, moteurs de recherche, agents outillés)
    et peut lire ou hiérarchiser des surfaces canoniques.
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/interpretive-governance
  creator:
    '@id': https://gautierdorval.com/entite/#person
- '@type': DefinedTerm
  '@id': https://gautierdorval.com/defined-terms/interpretive-governance/effect-indirect
  name: Effet indirect
  description: Régime d’effet où le système est alimenté par des observateurs intermédiaires (RAG, index internes, connecteurs)
    qui fournissent des sources ou extraits.
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/interpretive-governance
  creator:
    '@id': https://gautierdorval.com/entite/#person
- '@type': DefinedTerm
  '@id': https://gautierdorval.com/defined-terms/interpretive-governance/effect-contextual
  name: Effet contextuel
  description: Régime d’effet où des artefacts gouvernés sont injectés en session (copie-coller, fichiers, prompts), rendant
    périmètres et exclusions disponibles au raisonnement.
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/interpretive-governance
  creator:
    '@id': https://gautierdorval.com/entite/#person
- '@type': DefinedTerm
  '@id': https://gautierdorval.com/defined-terms/interpretive-governance/effect-deferred
  name: Effet différé
  description: Régime d’effet où des artefacts gouvernés sont ré-ingérés dans des cycles ultérieurs (évaluations, distillation,
    réentraînement), sans constituer une garantie déterministe.
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/interpretive-governance
  creator:
    '@id': https://gautierdorval.com/entite/#person
- '@type': DefinedTerm
  '@id': https://gautierdorval.com/defined-terms/interpretive-governance/influence
  name: Influence
  description: Effet probabiliste résultant de la structuration de l’environnement, même sans activation opératoire explicite.
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/interpretive-governance
  creator:
    '@id': https://gautierdorval.com/entite/#person
- '@type': DefinedTerm
  '@id': https://gautierdorval.com/defined-terms/interpretive-governance/operational-governance
  name: Gouvernance opératoire
  description: Activation explicite des conditions de légitimité de réponse (dont clarification et non-réponse) lorsque des
    surfaces canoniques sont accessibles et hiérarchisables (Q-Layer).
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/interpretive-governance
  url: https://gautierdorval.com/doctrine/q-layer/
  creator:
    '@id': https://gautierdorval.com/entite/#person

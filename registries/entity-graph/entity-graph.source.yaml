  '@id': https://gautierdorval.com/frameworks/ctic/#definedterm
  name: CTIC
  alternateName:
  - Cohérence transactionnelle inter-couches
  - Cross-layer transactional integrity
  description: Module normatif d’application visant à empêcher la fixation de variables dynamiques (prix, stock, livraison,
    promotions, vendeur) dans la couche interprétative sans signal de volatilité (source, horodatage, statut) et sans invalidation
    lors des rafraîchissements transactionnels.
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/ctic
  url: https://gautierdorval.com/frameworks/ctic/
  creator:
    '@id': https://gautierdorval.com/entite/#person
- '@type': DefinedTerm
  '@id': https://gautierdorval.com/defined-terms/ctic/dynamic-attribute
  name: Variable dynamique
  description: Valeur dépendante du temps, du vendeur, de la région, du stock ou des promotions, pouvant changer sans modifier
    l’identité du produit.
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/ctic
  creator:
    '@id': https://gautierdorval.com/entite/#person
- '@type': DefinedTerm
  '@id': https://gautierdorval.com/defined-terms/ctic/volatility-signal
  name: Signal de volatilité
  description: 'Métadonnées minimales associées à une valeur dynamique: source, horodatage, statut (indicatif, estimé, temps
    réel).'
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/ctic
  creator:
    '@id': https://gautierdorval.com/entite/#person
- '@type': DefinedTerm
  '@id': https://gautierdorval.com/defined-terms/ctic/refresh-invalidation
  name: Invalidation au rafraîchissement
  description: 'Exigence normative: lorsqu’un rafraîchissement transactionnel survient, toute valeur antérieure affichée ailleurs
    doit être invalidée, mise à jour ou marquée obsolète.'
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/ctic
  creator:

  name: 'SSA-E-R profile: canonical'
  description: 'Restitution profile: literal citation only. No reformulation.'
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/ssa-e-r
  creator:
    '@id': https://gautierdorval.com/entite/#person
- '@type': DefinedTerm
  '@id': https://gautierdorval.com/defined-terms/ssa-e-r/profile-structured
  name: 'SSA-E-R profile: structured'
  description: 'Restitution profile: controlled reformulation within stabilized definitions, hierarchies, and exclusions.'
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/ssa-e-r
  creator:
    '@id': https://gautierdorval.com/entite/#person

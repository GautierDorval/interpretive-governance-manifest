- '@type': DefinedTerm
  '@id': https://gautierdorval.com/doctrine/gouvernance-memoire/#definedterm
  name: Gouvernance de la mémoire
  alternateName:
  - Memory governance
  - Memory Governance
  description: Extension doctrinale appliquée aux systèmes stateful (RAG avancé, agents à mémoire persistée). Elle impose
    typage des objets mémoire, traçabilité, intégrité temporelle, consolidation gouvernée, oubli contrôlé et déclenchement
    automatique d’une rupture de conformité en cas de modification structurelle.
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/memory-governance
  url: https://gautierdorval.com/doctrine/gouvernance-memoire/
  creator:
    '@id': https://gautierdorval.com/entite/#person
  isRelatedTo:
  - '@id': https://gautierdorval.com/definitions/gouvernance-interpretative/#definedterm
  - '@id': https://gautierdorval.com/defined-terms/v-layer/versioning-drift-change-control
  - '@id': https://gautierdorval.com/defined-terms/v-layer/integrity-locking
  - '@id': https://gautierdorval.com/defined-terms/authority-governance-layer-3
- '@type': DefinedTerm
  '@id': https://gautierdorval.com/defined-terms/memory-object
  name: MemoryObject
  description: Unité persistée, typée, versionnée et traçable représentant un énoncé ou une consolidation dans un système
    stateful. Un MemoryObject doit préserver l’origine (source/utilisateur/système), la temporalité, et une empreinte d’intégrité.
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/memory-governance
  creator:
    '@id': https://gautierdorval.com/entite/#person
- '@type': DefinedTerm
  '@id': https://gautierdorval.com/defined-terms/consolidation-gouvernee
  name: Consolidation gouvernée
  description: Transformation contrôlée de plusieurs objets mémoire en un objet consolidé sous contraintes de typage, traçabilité,
    intégrité temporelle et journalisation append-only.
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/memory-governance
  creator:
    '@id': https://gautierdorval.com/entite/#person
- '@type': DefinedTerm
  '@id': https://gautierdorval.com/defined-terms/oubli-controle
  name: Oubli contrôlé
  description: Invalidation ou archivage gouverné d’un objet mémoire sans suppression silencieuse, avec raison explicite et
    conservation de l’historique.
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/memory-governance
  creator:
    '@id': https://gautierdorval.com/entite/#person
- '@type': DefinedTerm
  '@id': https://gautierdorval.com/defined-terms/derive-memoire
  name: Dérive mémoire
  description: Phénomène de transformation cumulative d’inférences en faits stabilisés via consolidation non gouvernée, biais
    de récupération, ou perte d’intégrité temporelle.
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/memory-governance
  creator:
    '@id': https://gautierdorval.com/entite/#person

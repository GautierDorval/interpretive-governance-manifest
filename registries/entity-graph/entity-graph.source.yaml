- '@type': DefinedTerm
  '@id': https://gautierdorval.com/definitions/interpretive-debt/#definedterm
  name: Dette interprétative
  alternateName:
  - Interpretive debt
  description: Passif cumulatif produit lorsque des approximations portant sur des informations à fort impact sont répétées,
    reformulées et stabilisées par des systèmes d’interprétation automatisée, jusqu’à devenir une représentation par défaut
    difficile à déplacer, rendant toute correction ultérieure plus coûteuse qu’une clarification initiale.
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/interpretive-debt
  url: https://gautierdorval.com/definitions/interpretive-debt/
  sameAs:

  '@id': https://gautierdorval.com/defined-terms/ssa-e-r/profile-contextual
  name: 'SSA-E-R profile: contextual'
  description: 'Restitution profile: contextual synthesis allowed without projection; must remain within declared scopes.'
  inDefinedTermSet:
    '@id': https://gautierdorval.com/defined-terms/ssa-e-r
  creator:
    '@id': https://gautierdorval.com/entite/#person

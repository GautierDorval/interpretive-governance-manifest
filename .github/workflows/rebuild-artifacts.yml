name: Rebuild canonical artifacts (entity graph + integrity)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branche à régénérer (ex. main ou feature/*)"
        required: true
        default: "main"
      push_changes:
        description: "Pousser un commit sur la branche (true/false)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements.txt

      - name: Rebuild artifacts
        run: |
          python scripts/generate_entity_graph.py
          python scripts/recompute_integrity_hashes.py

      - name: Show diff
        run: |
          git status --porcelain
          git diff --stat

      - name: Commit & push
        if: ${{ inputs.push_changes == 'true' }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add entity-graph.jsonld entity-graph.yaml integrity/hashes.json
            git commit -m "chore: rebuild canonical artifacts"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Upload artifacts (no push)
        if: ${{ inputs.push_changes != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: rebuilt-artifacts
          path: |
            entity-graph.jsonld
            entity-graph.yaml
            integrity/hashes.json

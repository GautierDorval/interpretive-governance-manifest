name: JSON Syntax Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON and JSON-LD syntax (tracked files only)
        run: python scripts/validate_json_syntax.py

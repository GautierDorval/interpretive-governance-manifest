name: Verify integrity hashes

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify integrity/hashes.json matches critical artifacts
        run: python scripts/verify_integrity_hashes.py
